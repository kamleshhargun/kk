<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Return / Exchange Form</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
}
.container {
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
h2 { text-align: center; }

.toggle-btns {
  text-align: center;
  margin-bottom: 10px;
}
.toggle-btns button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}
.active {
  background: #28a745;
  color: white;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}
textarea { resize: none; }

button.submit-btn {
  width: 100%;
  padding: 12px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
}

.success-box {
  display: none;
  text-align: center;
  padding: 15px;
  background: #e8f5e9;
  border-radius: 10px;
  margin-top: 10px;
}
.success-box b {
  color: #2e7d32;
}
.whatsapp-btn {
  margin-top: 10px;
  padding: 10px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="container">

<h2>Return / Exchange Form</h2>

<div class="toggle-btns">
  <button id="exchangeBtn" class="active" onclick="setMode('exchange')">Exchange</button>
  <button id="returnBtn" onclick="setMode('return')">Return</button>
</div>

<form id="myForm">

<input type="hidden" name="type" id="type" value="exchange">

<input type="text" name="name" placeholder="Customer Name" required>
<input type="tel" name="mobile" placeholder="Mobile Number" required pattern="[0-9]{10}">
<input type="email" name="email" placeholder="Email ID" required>
<input type="text" name="order_id" placeholder="Order ID" required>
<input type="text" name="return_product" placeholder="Product Name (Return)" required>

<div id="exchangeField">
  <input type="text" name="exchange_product" placeholder="Product Name (Exchange)">
</div>

<textarea name="description" placeholder="Reason / Description" required></textarea>

<button type="submit" class="submit-btn" id="submitBtn">Submit Request</button>

</form>

<div class="success-box" id="successBox"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxRfGkQlautYe5s0d5QXEFZ_vRl9fRT0nQorcZqMaIstn7myJMICCV7S3PqD4SdDwkL/exec";
const whatsappNumber = "919828222076";

const form = document.getElementById("myForm");
const successBox = document.getElementById("successBox");
const submitBtn = document.getElementById("submitBtn");

let lastMessage = "";

function setMode(mode) {
  document.getElementById("type").value = mode;

  if (mode === "return") {
    document.getElementById("exchangeField").style.display = "none";
    exchangeBtn.classList.remove("active");
    returnBtn.classList.add("active");
  } else {
    document.getElementById("exchangeField").style.display = "block";
    exchangeBtn.classList.add("active");
    returnBtn.classList.remove("active");
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.innerText = "⏳ Submitting...";

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  try {

    const res = await fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();
    const requestID = result.request_id;

    const now = new Date();
    const date = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata" });
    const time = now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata" });

    // WhatsApp message store (but NOT open)
    lastMessage = `📦 ${data.type} Request

Request ID: ${requestID}
Name: ${data.name}
Mobile: ${data.mobile}
Order ID: ${data.order_id}

Return: ${data.return_product}
Exchange: ${data.exchange_product || "N/A"}

Date: ${date}
Time: ${time}`;

    // Hide form
    form.style.display = "none";

    // Show success
    successBox.style.display = "block";
    successBox.innerHTML = `
      <p><b>✅ Request Submitted Successfully</b></p>
      <p><b>Request ID:</b> ${requestID}</p>
      <p>Date: ${date} | Time: ${time}</p>

      <p>Our team will contact you as soon as possible.</p>
      <p>If needed, you can share this request on WhatsApp.</p>

      <button class="whatsapp-btn" onclick="shareWhatsApp()">Share on WhatsApp</button>
    `;

  } catch (err) {
    alert("❌ Error submitting form");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Request";
  }

});

function shareWhatsApp(){
  const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(lastMessage)}`;
  window.open(url, "_blank");
}

</script>

</body>
</html>
