<!DOCTYPE html>
<html>
<head>
  <title>Exchange / Return Request</title>

  <style>
    body { font-family: Arial; text-align:center; }
    input, select, textarea {
      width: 300px;
      padding: 10px;
      margin: 5px;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>Exchange / Return Request</h2>
<p style="color:red;">₹100 will be deducted on exchange or returns</p>

<form id="form">

<input type="text" name="name" placeholder="Name" required><br>
<input type="text" name="mobile" placeholder="Mobile" required><br>
<input type="email" name="email" placeholder="Email"><br>
<input type="text" name="order_id" placeholder="Order ID" required><br>

<select name="type">
  <option value="exchange" selected>Exchange</option>
  <option value="return">Return</option>
</select><br>

<textarea name="reason" placeholder="Please describe your request"></textarea><br>

<button type="submit" id="btn">Submit</button>

</form>

<div id="success" style="display:none;"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz4jK24JvVgOQG0gCz_Qsa--b_K8NmbA6OvHE-xjPdZmJniEdi-anfmrrYKb2KoNnhfNQ/exec";
const ADMIN_WHATSAPP = "919216810276"; // apna number

document.getElementById("form").addEventListener("submit", async function(e) {
  e.preventDefault();

  let btn = document.getElementById("btn");
  btn.innerText = "Please wait...";
  btn.disabled = true;

  let form = new FormData(this);
  let data = Object.fromEntries(form.entries());

  let res = await fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });

  let json = await res.json();

  // Hide form
  document.getElementById("form").style.display = "none";

  let msg = `Your request has been received successfully.
Your Request ID is: ${json.request_id}

If you want immediate action, please contact our executive via WhatsApp.`;

  let wa = `https://wa.me/${ADMIN_WHATSAPP}?text=${encodeURIComponent(msg)}`;

  document.getElementById("success").style.display = "block";
  document.getElementById("success").innerHTML = `
    <p>${msg}</p>
    <a href="${wa}" target="_blank">
      <button>Share on WhatsApp</button>
    </a>
  `;
});
</script>

</body>
</html>
