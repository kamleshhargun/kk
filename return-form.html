<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Return / Exchange Form</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
}
.container {
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
h2 {
  text-align: center;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}
button {
  width: 100%;
  padding: 12px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
}
button:hover {
  background: #218838;
}
.success {
  color: green;
  text-align: center;
}
</style>

</head>
<body>

<div class="container">
<h2>Return / Exchange Form</h2>

<form id="myForm">

<input type="text" name="name" placeholder="Customer Name" required>

<input type="tel" name="mobile" placeholder="Mobile Number" required pattern="[0-9]{10}">

<input type="email" name="email" placeholder="Email ID" required>

<input type="text" name="order_id" placeholder="Order ID" required>

<input type="text" name="return_product" placeholder="Product Name (Return)" required>

<input type="text" name="exchange_product" placeholder="Product Name (Exchange)" required>

<textarea name="description" placeholder="Reason / Description" required></textarea>

<button type="submit">Submit Request</button>

<p class="success" id="msg"></p>

</form>
</div>

<script>
const scriptURL = "PASTE_YOUR_SCRIPT_URL_HERE";
const whatsappNumber = "91XXXXXXXXXX";

const form = document.getElementById("myForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", e => {
  e.preventDefault();

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  // IST Date & Time
  const now = new Date();
  const date = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata" });
  const time = now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata" });

  data.date = date;
  data.time = time;

  // Send to Google Sheet
  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => {
    msg.innerText = "Request Submitted Successfully!";
  });

  // WhatsApp Message
  const message = `📦 Return Request

Name: ${data.name}
Mobile: ${data.mobile}
Email: ${data.email}
Order ID: ${data.order_id}
Return: ${data.return_product}
Exchange: ${data.exchange_product}
Reason: ${data.description}

Date: ${date}
Time: ${time}`;

  const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");

  form.reset();
});
</script>

</body>
</html>
