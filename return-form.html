<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Return / Exchange Form</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
}
.container {
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
h2 {
  text-align: center;
}
.toggle-btns {
  text-align: center;
  margin-bottom: 10px;
}
.toggle-btns button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}
.active {
  background: #28a745;
  color: white;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}
textarea {
  resize: none; /* disable resize */
}
button.submit-btn {
  width: 100%;
  padding: 12px;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
}
button.submit-btn:hover {
  background: #218838;
}
.success {
  text-align: center;
  font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
<h2>Return / Exchange Form</h2>

<div class="toggle-btns">
  <button id="exchangeBtn" class="active" onclick="setMode('exchange')">Exchange</button>
  <button id="returnBtn" onclick="setMode('return')">Return</button>
</div>

<form id="myForm">

<input type="hidden" name="type" id="type" value="Exchange">

<input type="text" name="name" placeholder="Customer Name" required>

<input type="tel" name="mobile" placeholder="Mobile Number" required pattern="[0-9]{10}">

<input type="email" name="email" placeholder="Email ID" required>

<input type="text" name="order_id" placeholder="Order ID" required>

<input type="text" name="return_product" placeholder="Product Name (Return)" required>

<div id="exchangeField">
  <input type="text" name="exchange_product" placeholder="Product Name (Exchange)">
</div>

<textarea name="description" placeholder="Reason / Description" required></textarea>

<button type="submit" class="submit-btn">Submit Request</button>

<p class="success" id="msg"></p>

</form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzqYFfDDLdnH3-JKDT3F6VZfEVeadfaUkYwIzdDlVFiccLSkUnQNPREOQGvJQFLP-zP/exec";
const whatsappNumber = "919828222076";

const form = document.getElementById("myForm");
const msg = document.getElementById("msg");

function setMode(mode) {
  document.getElementById("type").value = mode;

  if (mode === "return") {
    document.getElementById("exchangeField").style.display = "none";
    document.getElementById("exchangeBtn").classList.remove("active");
    document.getElementById("returnBtn").classList.add("active");
  } else {
    document.getElementById("exchangeField").style.display = "block";
    document.getElementById("exchangeBtn").classList.add("active");
    document.getElementById("returnBtn").classList.remove("active");
  }
}

form.addEventListener("submit", e => {
  e.preventDefault();

  msg.innerText = "⏳ Please wait...";

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  const now = new Date();
  const date = now.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata" });
  const time = now.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata" });

  data.date = date;
  data.time = time;

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {

    const requestID = res.request_id;

    const message = `📦 ${data.type} Request

Request ID: ${requestID}
Name: ${data.name}
Mobile: ${data.mobile}
Order ID: ${data.order_id}

Return: ${data.return_product}
Exchange: ${data.exchange_product || "N/A"}

Date: ${date}
Time: ${time}`;

    const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");

    msg.innerText = "✅ Submitted Successfully!";
    form.reset();

    setMode('exchange'); // reset mode
  });
});
</script>

</body>
</html>
