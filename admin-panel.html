<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body { font-family: Arial; background:#111; color:#fff; padding:20px; }
    table { width:100%; border-collapse:collapse; background:#222; }
    th, td { padding:8px; border:1px solid #444; text-align:center; }
    button { padding:5px; margin:2px; color:#fff; border:none; cursor:pointer; }
    .approve { background:green; }
    .reject { background:red; }
    .pending { background:orange; }
  </style>
</head>

<body>

<h2>Dashboard</h2>

<table id="table"></table>

<script>
const API = "https://script.google.com/macros/s/AKfycbz4jK24JvVgOQG0gCz_Qsa--b_K8NmbA6OvHE-xjPdZmJniEdi-anfmrrYKb2KoNnhfNQ/exec";

async function loadData() {
  let res = await fetch(API);
  let data = await res.json();

  let html = `<tr>
<th>Date</th><th>Time</th><th>ID</th><th>Name</th><th>Mobile</th>
<th>Email</th><th>Order</th><th>Type</th><th>Reason</th>
<th>Status</th><th>Duplicate</th><th>Action</th>
</tr>`;

  data.forEach(item => {

    html += `
<tr>
<td>${item.date}</td>
<td>${item.time}</td>
<td>${item.request_id}</td>
<td>${item.name}</td>
<td>${item.mobile}</td>
<td>${item.email}</td>
<td>${item.order_id}</td>
<td>${item.type}</td>
<td>${item.reason}</td>

<td>${item.status}</td>
<td>${item.duplicate}</td>

<td>
<button class="pending" onclick="updateStatus('${item.request_id}','pending')">Pending</button>
<button class="approve" onclick="updateStatus('${item.request_id}','pickup generated')">Pickup Generated</button>
<button class="reject" onclick="updateStatus('${item.request_id}','done')">Done</button>
</td>
</tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

async function updateStatus(id, status) {
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "update",
      request_id: id,
      status: status
    })
  });
  loadData();
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
