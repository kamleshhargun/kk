<!DOCTYPE html>
<html>
<head>
<title>Gulabishehar Admin Panel</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f6f6f6;
}

/* Container */
.container {
  max-width: 1200px;
  margin: 25px auto;
  background: #fff;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.08);
}

/* Heading */
h2 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 20px;
}

/* ===== STATS (Top Cards) ===== */
.stats {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.stat-box {
  background: #000;
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;
  min-width: 120px;
  text-align: center;
  transition: 0.3s;
}

.stat-box span {
  display: block;
  font-size: 18px;
  font-weight: bold;
}

/* ===== TABS ===== */
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.tabs button {
  padding: 8px 18px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background: #f1f1f1;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

/* Hover */
.tabs button:hover {
  background: #e0e0e0;
}

/* Active Tab */
.tabs button.active {
  background: #000;
  color: #fff;
  border-color: #000;
}

/* ===== SEARCH ===== */
#searchBox {
  width: 60%;
  padding: 10px;
  margin: 10px auto;
  display: block;
  border-radius: 6px;
  border: 1px solid #ddd;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 10px;
}

th {
  background: #000;
  color: #fff;
}

th, td {
  border: 1px solid #eee;
  padding: 8px;
  text-align: center;
}

/* ===== BUTTONS ===== */
.apply-btn {
  background: #000;
  color: #fff;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.undo-btn {
  background: #ff9800;
  color: #fff;
  border: none;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
}

/* ===== LOADING ===== */
#loading {
  text-align: center;
  font-weight: 500;
  margin: 10px;
}

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #000;
  color: #fff;
  padding: 10px 14px;
  border-radius: 6px;
  display: none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  #searchBox {
    width: 90%;
  }
}

</style>

</head>
<body>

<div class="container">

<h2>Gulabishehar Admin Panel</h2>

<!-- Dashboard -->
<div class="stats">
  <div>Return: <span id="returnCount">0</span></div>
  <div>Exchange: <span id="exchangeCount">0</span></div>
  <div>Duplicate: <span id="duplicateCount">0</span></div>
  <div>Done: <span id="doneCount">0</span></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button onclick="setTab('return')" id="returnTab" class="active">Return</button>
  <button onclick="setTab('exchange')" id="exchangeTab">Exchange</button>
  <button onclick="setTab('duplicate')" id="duplicateTab">Duplicate</button>
  <button onclick="setTab('done')" id="doneTab">Done</button>
  <button onclick="exportCSV()">📥 Export</button>
</div>

<div style="text-align:center;">
  <input id="searchBox" placeholder="Search..." onkeyup="renderTable()">
</div>

<div id="loading">⏳ Loading...</div>

<table id="dataTable"></table>

</div>

<div id="toast"></div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbwXWhuMaDMOPhJigZvqBIJrKsQjVcEEuZ_Ge9RS0Z17jKxzCw4HWMWbMfRk-Dpmzbg/exec";

let globalData = [];
let currentTab = "return";

function loadData(){
  document.getElementById("loading").style.display="block";

  fetch(sheetURL+"?mode=admin")
  .then(res=>res.json())
  .then(data=>{
    globalData=data;
    document.getElementById("loading").style.display="none";
    calculateStats();
    renderTable();
  });
}

function calculateStats(){
  let r=0,e=0,d=0,done=0;

  globalData.forEach(row=>{
    let type=(row.type||"").toLowerCase();
    let status=(row.status||"").toLowerCase();

    if(type==="return" && status!=="duplicate" && status!=="done") r++;
    if(type==="exchange" && status!=="duplicate" && status!=="done") e++;
    if(status==="duplicate") d++;
    if(status==="done") done++;
  });

  document.getElementById("returnCount").innerText=r;
  document.getElementById("exchangeCount").innerText=e;
  document.getElementById("duplicateCount").innerText=d;
  document.getElementById("doneCount").innerText=done;
}

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("active");
  renderTable();
}

function renderTable(){

  let search=document.getElementById("searchBox").value.toLowerCase();

  let html="<tr>";

  // dynamic headers
  if(globalData.length>0){
    Object.keys(globalData[0]).forEach(h=>{
      html+=`<th>${h}</th>`;
    });
    html+="<th>Action</th></tr>";
  }

  globalData.forEach((row,i)=>{

    let text=Object.values(row).join(" ").toLowerCase();
    if(search && !text.includes(search)) return;

    let type=(row.type||"").toLowerCase();
    let status=(row.status||"").toLowerCase();

    let show=false;
    if(currentTab==="return" && type==="return" && status!=="duplicate" && status!=="done") show=true;
    if(currentTab==="exchange" && type==="exchange" && status!=="duplicate" && status!=="done") show=true;
    if(currentTab==="duplicate" && status==="duplicate") show=true;
    if(currentTab==="done" && status==="done") show=true;

    if(!show) return;

    html+="<tr>";

    Object.values(row).forEach(v=>{
      html+=`<td>${v}</td>`;
    });

    // actions
    if(currentTab==="duplicate" || currentTab==="done"){
      html+=`<td><button class="undo-btn" onclick="undo('${row.request_id}')">Undo</button></td>`;
    } else {
      html+=`<td>
        <select id="a_${i}">
          <option value="">Select</option>
          <option value="duplicate">Duplicate 🔁</option>
          <option value="pickup">Pickup 🚚</option>
          <option value="done">Done ✅</option>
        </select>
        <button class="apply-btn" onclick="apply(${i})">✔</button>
      </td>`;
    }

    html+="</tr>";

  });

  document.getElementById("dataTable").innerHTML=html;
}

function apply(i){

  let row=globalData[i];
  let action=document.getElementById("a_"+i).value;

  if(!action) return showToast("Select action");

  if(!confirm("Are you sure?")) return;

  let status="";
  if(action==="done") status="GREEN";
  if(action==="pickup") status="YELLOW";
  if(action==="duplicate") status="DUPLICATE";

  fetch(sheetURL,{
    method:"POST",
    body:JSON.stringify({
      mode:"updateStatus",
      request_id:row.request_id,
      status:status
    })
  }).then(()=>{
    showToast("Updated");
    loadData();
  });
}

function undo(id){

  if(!confirm("Undo this action?")) return;

  fetch(sheetURL,{
    method:"POST",
    body:JSON.stringify({
      mode:"updateStatus",
      request_id:id,
      status:"UNDO_DUPLICATE"
    })
  }).then(()=>{
    showToast("Restored");
    loadData();
  });
}

function exportCSV(){

  let csv=[];
  let headers=Object.keys(globalData[0]||{});
  csv.push(headers.join(","));

  globalData.forEach(row=>{
    let values=headers.map(h=>`"${row[h]||""}"`);
    csv.push(values.join(","));
  });

  let blob=new Blob([csv.join("\n")]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

function showToast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

loadData();

</script>

</body>
</html>
