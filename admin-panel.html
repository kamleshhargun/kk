<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
}
.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
h2 { text-align:center; }

.tabs {
  text-align:center;
  margin-bottom:15px;
}
.tabs button {
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.active {
  background:#28a745;
  color:white;
}

table {
  width:100%;
  border-collapse: collapse;
}
th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

button.action {
  padding:5px 8px;
  margin:2px;
}
</style>

</head>
<body>

<div class="container">

<h2>Admin Panel</h2>

<div class="tabs">
  <button onclick="setTab('return')" id="returnTab" class="active">Return</button>
  <button onclick="setTab('exchange')" id="exchangeTab">Exchange</button>
  <button onclick="setTab('duplicate')" id="duplicateTab">Duplicate</button>
  <button onclick="setTab('done')" id="doneTab">Done</button>

  <button onclick="loadData()">🔄</button>
  <button onclick="openForm()">📝</button>
  <button onclick="exportCSV()">📥</button>
</div>

<table id="dataTable"></table>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbxRfGkQlautYe5s0d5QXEFZ_vRl9fRT0nQorcZqMaIstn7myJMICCV7S3PqD4SdDwkL/exec";
let globalData = [];
let currentTab = "return";

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("active");

  renderTable();
}

function loadData(){
  fetch(sheetURL)
  .then(res => res.json())
  .then(data=>{
    globalData = data;
    renderTable();
  })
  .catch(()=>{
    alert("❌ Data load error");
  });
}

function renderTable(){

  if(globalData.length === 0){
    document.getElementById("dataTable").innerHTML = "<tr><td>No Data</td></tr>";
    return;
  }

  let html = "<tr><th>ID</th><th>Name</th><th>Mobile</th><th>Type</th><th>Status</th><th>Action</th></tr>";

  globalData.forEach((row,index)=>{

    let type = (row.Type || "").toLowerCase();
    let status = (row.Status || "").toLowerCase();
    let duplicate = (row.Duplicate || "").toLowerCase();

    let show = false;

    if(currentTab==="return" && type==="return" && duplicate!=="yes" && status!=="done") show=true;
    if(currentTab==="exchange" && type==="exchange" && duplicate!=="yes" && status!=="done") show=true;
    if(currentTab==="duplicate" && duplicate==="yes") show=true;
    if(currentTab==="done" && status==="done") show=true;

    if(show){
      html += `<tr>
        <td>${row["Request No"]||""}</td>
        <td>${row.Name||""}</td>
        <td>${row.Mobile||""}</td>
        <td>${row.Type||""}</td>
        <td>${row.Status||""}</td>
        <td>
          <button class="action" onclick="sendWhatsApp(${index})">Msg</button>
        </td>
      </tr>`;
    }

  });

  document.getElementById("dataTable").innerHTML = html;
}

function sendWhatsApp(i){
  let r = globalData[i];

  let msg = `Hello ${r.Name}
Request ID: ${r["Request No"]}
Status: ${r.Status}`;

  window.open(`https://wa.me/91${r.Mobile}?text=${encodeURIComponent(msg)}`);
}

function openForm(){
  window.open("return-form.html","_blank");
}

function exportCSV(){

  if(globalData.length===0){
    alert("No data");
    return;
  }

  let csv=[];
  let headers=Object.keys(globalData[0]);
  csv.push(headers.join(","));

  globalData.forEach(row=>{
    let values=headers.map(h=>`"${row[h]||""}"`);
    csv.push(values.join(","));
  });

  let blob=new Blob([csv.join("\n")]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.csv";
  a.click();
}

loadData();
</script>

</body>
</html>
