<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
}
.container {
  max-width: 1000px;
  margin: 20px auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}
h2 {
  text-align: center;
}
.tabs {
  text-align: center;
  margin-bottom: 15px;
}
.tabs button {
  padding: 8px 15px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
.active {
  background: #28a745;
  color: white;
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}
button.action {
  padding: 5px 8px;
  margin: 2px;
}
#settingsBox {
  display:none;
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>Admin Panel</h2>

<div class="tabs">
  <button onclick="setTab('return')" id="returnTab" class="active">Return</button>
  <button onclick="setTab('exchange')" id="exchangeTab">Exchange</button>
  <button onclick="setTab('duplicate')" id="duplicateTab">Duplicate</button>
  <button onclick="setTab('done')" id="doneTab">Done</button>
  <button onclick="toggleSettings()">⚙️</button>
</div>

<div id="settingsBox">
  <input type="text" id="formURL" placeholder="Return Form URL" style="width:250px">
  <button onclick="openForm()">Open Form</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<table id="dataTable"></table>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbxrjJeEdvZH8ZYEZmUec_cmeFQKlt6vdqgoAWThpRF13sHI_Can1xuAdQB7TZPZ37rm/exec";
let globalData = [];
let currentTab = "return";

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("active");

  renderTable();
}

function toggleSettings(){
  let box = document.getElementById("settingsBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

function openForm(){
  let url = document.getElementById("formURL").value;
  if(url) window.open(url,"_blank");
}

function loadData(){
  fetch(sheetURL)
  .then(res => res.json())
  .then(data=>{
    globalData = data;
    renderTable();
  });
}

function renderTable(){
  let html = "<tr><th>ID</th><th>Name</th><th>Mobile</th><th>Type</th><th>Status</th><th>Action</th></tr>";

  globalData.forEach((row,index)=>{

    let show = false;

    if(currentTab === "return" && row.Type === "return" && row.Duplicate !== "yes" && row.Status !== "Done") show = true;
    if(currentTab === "exchange" && row.Type === "exchange" && row.Duplicate !== "yes" && row.Status !== "Done") show = true;
    if(currentTab === "duplicate" && row.Duplicate === "yes") show = true;
    if(currentTab === "done" && row.Status === "Done") show = true;

    if(show){
      html += `<tr>
        <td>${row["Request No"]}</td>
        <td>${row.Name}</td>
        <td>${row.Mobile}</td>
        <td>${row.Type}</td>
        <td>${row.Status}</td>
        <td>
          <button class="action" onclick="sendWhatsApp(${index})">Msg</button>
          <button class="action" onclick="markDone(${index})">Done</button>
          <button class="action" onclick="markDuplicate(${index})">Duplicate</button>
        </td>
      </tr>`;
    }

  });

  document.getElementById("dataTable").innerHTML = html;
}

function sendWhatsApp(i){
  let r = globalData[i];

  let msg = `Hello ${r.Name},
Request ID: ${r["Request No"]}
Status Update: ${r.Status}`;

  window.open(`https://wa.me/91${r.Mobile}?text=${encodeURIComponent(msg)}`);
}

function markDone(i){
  alert("Mark Done in Sheet manually OR connect API next step");
}

function markDuplicate(i){
  alert("Mark Duplicate in Sheet manually OR API next step");
}

function exportCSV(){
  let csv = [];
  let headers = Object.keys(globalData[0]);
  csv.push(headers.join(","));

  globalData.forEach(row=>{
    csv.push(headers.map(h=>`"${row[h]}"`).join(","));
  });

  let blob = new Blob([csv.join("\n")]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.csv";
  a.click();
}

loadData();
</script>

</body>
</html>
