<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {font-family:Arial;background:#f5f5f5;}
.container{max-width:1100px;margin:20px auto;background:white;padding:15px;border-radius:10px;}
.tabs{text-align:center;margin-bottom:15px;}
.tabs button{padding:8px 15px;margin:5px;border:none;background:#ddd;cursor:pointer;}
.tabs .active{background:#000;color:#fff;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #ddd;padding:7px;text-align:center;}
</style>

</head>
<body>

<div class="container">

<h2>Admin Panel</h2>

<div class="tabs">
  <button onclick="setTab('return')" id="returnTab" class="active">Return</button>
  <button onclick="setTab('exchange')" id="exchangeTab">Exchange</button>
  <button onclick="setTab('duplicate')" id="duplicateTab">Duplicate</button>
  <button onclick="setTab('done')" id="doneTab">Done</button>
</div>

<table id="dataTable"></table>

</div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbxCrg2WbNHdMWFoEPsSAm6_VONtmuNMHArFivgjdrIPHnsfgNkVU5kepDFrnjdIgGgJ/exec";
let globalData = [];
let currentTab = "return";

function setTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("active");
  renderTable();
}

function loadData(){
  fetch(sheetURL + "?mode=admin")
  .then(res=>res.json())
  .then(data=>{
    globalData = data;
    renderTable();
  });
}

function renderTable(){

  let html = `
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Mobile</th>
    <th>Type</th>
    <th>Status</th>
    <th>Action</th>
  </tr>`;

  globalData.forEach((row,i)=>{

    let type = (row.type||"").toLowerCase();
    let status = (row.status||"").toLowerCase();
    let duplicate = (row.duplicate||"").toLowerCase();

    let show=false;

    if(currentTab==="return" && type==="return" && duplicate!=="yes" && status!=="done") show=true;
    if(currentTab==="exchange" && type==="exchange" && duplicate!=="yes" && status!=="done") show=true;
    if(currentTab==="duplicate" && duplicate==="yes") show=true;
    if(currentTab==="done" && status==="done") show=true;

    if(show){
      html += `<tr>
        <td>${row.request_id}</td>
        <td>${row.name}</td>
        <td>${row.mobile}</td>
        <td>${row.type}</td>
        <td>${row.status}</td>
        <td>
          <select onchange="handleAction(${i}, this.value); this.value=''">
            <option value="">Select</option>
            <option value="duplicate">Duplicate 🔁</option>
            <option value="pickup">Pickup Generated 🚚</option>
            <option value="msg">Send Msg 📩</option>
            <option value="done">Done ✅</option>
          </select>
        </td>
      </tr>`;
    }

  });

  document.getElementById("dataTable").innerHTML = html;
}

function handleAction(i,action){

  let row = globalData[i];

  if(action==="msg"){
    let msg=`Hello ${row.name}
Request ID: ${row.request_id}
Status: ${row.status}`;
    window.open(`https://wa.me/91${row.mobile}?text=${encodeURIComponent(msg)}`);
    return;
  }

  let status="";
  if(action==="done") status="GREEN";
  if(action==="pickup") status="YELLOW";
  if(action==="duplicate") status="DUPLICATE";

  fetch(sheetURL,{
    method:"POST",
    body: JSON.stringify({
      mode:"updateStatus",
      request_id: row.request_id,
      status: status
    })
  }).then(()=>loadData());
}

loadData();

</script>

</body>
</html>
