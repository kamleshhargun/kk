<!DOCTYPE html>

<html>
<head>
<title>Gulabishehar Admin Panel</title>

<style>
body { font-family: Arial; background:#f6f6f6; }
.container { max-width:1200px; margin:25px auto; background:#fff; padding:20px; border-radius:14px; }
h2{text-align:center}

/* header */
.header-stats{text-align:center;margin-bottom:15px}
.header-stats span{margin:0 10px;font-weight:bold}

/* tabs */
.tabs{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.tabs button{padding:8px 14px;border:1px solid #ddd;border-radius:6px;background:#f1f1f1;cursor:pointer}
.tabs button.active{background:#000;color:#fff}

/* search */
.search-container{display:flex;justify-content:flex-end;margin-bottom:10px}
.search-box{position:relative}
#searchBox{width:220px;padding:8px 30px 8px 10px;border-radius:6px;border:1px solid #ddd}
.clear-btn{position:absolute;right:8px;top:6px;cursor:pointer}

/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#000;color:#fff}
th,td{border:1px solid #eee;padding:8px;text-align:center}

/* btn */
.apply-btn{background:#000;color:#fff;border:none;padding:5px 10px;border-radius:5px}
.undo-btn{background:#ff9800;color:#fff;border:none;padding:5px 10px;border-radius:5px}

/* mobile */
.mobile-card{display:none}
@media(max-width:768px){
table{display:none}
.mobile-card{display:block;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:10px}
}
</style>

</head>

<body>

<div class="container">

<h2>Gulabishehar Admin Panel</h2>

<div class="header-stats">
<h3>Requests Received</h3>
<span>Today: <span id="todayCount">0</span></span>
<span>Yesterday: <span id="yesterdayCount">0</span></span>
<span>Total: <span id="totalCount">0</span></span>
</div>

<div class="tabs">
<button onclick="setTab('return')" id="returnTab" class="active">Return (0)</button>
<button onclick="setTab('exchange')" id="exchangeTab">Exchange (0)</button>
<button onclick="setTab('duplicate')" id="duplicateTab">Duplicate (0)</button>
<button onclick="setTab('done')" id="doneTab">Done (0)</button>

<button onclick="refreshData()">🔄</button>

<select onchange="exportCSV(this.value)">
<option value="">📥 Export</option>
<option value="all">All</option>
<option value="return">Return</option>
<option value="exchange">Exchange</option>
<option value="duplicate">Duplicate</option>
<option value="done">Done</option>
</select>
</div>

<div class="search-container">
<div class="search-box">
<input id="searchBox" placeholder="Search...">
<span class="clear-btn" onclick="clearSearch()">✖</span>
</div>
</div>

<table id="dataTable"></table>
<div id="mobileView"></div>

</div>

<script>

const sheetURL="https://script.google.com/macros/s/AKfycbzAtBQ85A7OYN3S35XiPiCSbXqZI3SrDu9lVdX3NDUGgacTQ2regqhfcAylxOXwrFTd/exec";

let globalData=[];
let currentTab="return";

/* FIX IST DATE */
function getISTDate(offset=0){
let d=new Date();
d.setHours(d.getHours()+5);
d.setMinutes(d.getMinutes()+30);
d.setDate(d.getDate()+offset);
return d.toISOString().split("T")[0];
}

/* LOAD FAST */
function loadData(){
fetch(sheetURL+"?mode=admin")
.then(r=>r.json())
.then(data=>{
globalData=data;
calculateStats();
renderTable();
});
}

/* FIX COUNT */
function calculateStats(){

let today=getISTDate(0);
let yesterday=getISTDate(-1);

let t=0,y=0,total=0,r=0,e=0,d=0,done=0;

globalData.forEach(row=>{

let date=(row.date||"").split("T")[0];
let type=row.type;
let status=row.status;

if(type==="return"||type==="exchange"){
total++;
if(date===today) t++;
if(date===yesterday) y++;
}

if(type==="return" && status!=="duplicate" && status!=="done") r++;
if(type==="exchange" && status!=="duplicate" && status!=="done") e++;
if(status==="duplicate") d++;
if(status==="done") done++;

});

document.getElementById("todayCount").innerText=t;
document.getElementById("yesterdayCount").innerText=y;
document.getElementById("totalCount").innerText=total;

document.getElementById("returnTab").innerText=`Return (${r})`;
document.getElementById("exchangeTab").innerText=`Exchange (${e})`;
document.getElementById("duplicateTab").innerText=`Duplicate (${d})`;
document.getElementById("doneTab").innerText=`Done (${done})`;
}

/* TAB */
function setTab(tab){
currentTab=tab;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
document.getElementById(tab+"Tab").classList.add("active");
renderTable();
}

/* SEARCH */
document.getElementById("searchBox").addEventListener("keyup",()=>renderTable());
function clearSearch(){document.getElementById("searchBox").value="";renderTable();}

/* ACTION FIX */
function apply(i){

let row=globalData[i];
let action=document.getElementById("a_"+i).value;

if(!action) return alert("Select action");

let status="";
if(action==="done") status="GREEN";
if(action==="pickup") status="YELLOW";
if(action==="duplicate") status="DUPLICATE";

fetch(sheetURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
mode:"updateStatus",
request_id:row.request_id,
status:status
})
})
.then(()=>loadData());
}

/* UNDO FIX */
function undo(id){
fetch(sheetURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
mode:"updateStatus",
request_id:id,
status:"UNDO_DUPLICATE"
})
})
.then(()=>loadData());
}

/* TABLE */
function renderTable(){

let html="<tr>";
let mobile="";

if(globalData.length>0){
Object.keys(globalData[0]).forEach(h=>html+=`<th>${h}</th>`);
html+="<th>Action</th></tr>";
}

globalData.forEach((row,i)=>{

let type=row.type;
let status=row.status;

let show=false;
if(currentTab==="return" && type==="return" && status!=="duplicate" && status!=="done") show=true;
if(currentTab==="exchange" && type==="exchange" && status!=="duplicate" && status!=="done") show=true;
if(currentTab==="duplicate" && status==="duplicate") show=true;
if(currentTab==="done" && status==="done") show=true;

if(!show) return;

html+="<tr>";
Object.values(row).forEach(v=>html+=`<td>${v}</td>`);

let action="";
if(currentTab==="duplicate"||currentTab==="done"){
action=`<button onclick="undo('${row.request_id}')">Undo</button>`;
}else{
action=`<select id="a_${i}">
<option value="">Select</option>
<option value="duplicate">Duplicate</option>
<option value="pickup">Pickup</option>
<option value="done">Done</option>
</select>
<button onclick="apply(${i})">✔</button>`;
}

html+=`<td>${action}</td></tr>`;

mobile+=`<div class="mobile-card">
<b>${row.name}</b><br>
${row.mobile}<br>
${row.order_id}<br>
${row.type} | ${row.status}<br>
${action}
</div>`;

});

document.getElementById("dataTable").innerHTML=html;
document.getElementById("mobileView").innerHTML=mobile;
}

/* REFRESH */
function refreshData(){loadData();}

loadData();

</script>

</body>
</html>
