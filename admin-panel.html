<!DOCTYPE html>

<html>
<head>
<title>Gulabishehar Admin Panel</title>

<style>
body{font-family:Arial;background:#f6f6f6}
.container{max-width:1200px;margin:20px auto;background:#fff;padding:20px;border-radius:12px}

/* HEADER */
.header{text-align:center}
.header h3{font-size:15px;margin-bottom:5px}

/* STATS */
.stats span{margin:0 10px;font-weight:bold}

/* TABS */
.tabs{display:flex;justify-content:center;gap:10px;margin:10px 0;flex-wrap:wrap}
.tabs button{padding:8px 12px;border:1px solid #ccc;cursor:pointer;border-radius:6px}
.tabs .active{background:#000;color:#fff}

/* SEARCH */
.search{display:flex;justify-content:flex-end;margin-bottom:10px}
.search input{padding:6px;width:200px}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:6px;text-align:center}
th{background:#000;color:#fff}

/* MOBILE CARD */
.mobile-card{display:none}

@media(max-width:768px){
table{display:none}
.mobile-card{
display:block;
border:1px solid #eee;
border-radius:10px;
padding:12px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05)
}
.mobile-card b{font-size:14px}
.mobile-row{margin:4px 0;font-size:13px}
}

button{cursor:pointer}
</style>

</head>

<body>

<div class="container">

<div class="header">
<h3>Requests Received</h3>
<div class="stats">
Today: <span id="today">0</span> |
Yesterday: <span id="yesterday">0</span> |
Total: <span id="total">0</span>
</div>
</div>

<div class="tabs">
<button onclick="setTab('return')" id="returnTab" class="active">Return (0)</button>
<button onclick="setTab('exchange')" id="exchangeTab">Exchange (0)</button>
<button onclick="setTab('duplicate')" id="duplicateTab">Duplicate (0)</button>
<button onclick="setTab('done')" id="doneTab">Done (0)</button>
<button onclick="loadData()">🔄</button>
</div>

<div class="search">
<input id="searchBox" placeholder="Search..." onkeyup="render()">
</div>

<table id="table"></table>
<div id="mobileView"></div>

</div>

<script>

const URL="https://script.google.com/macros/s/AKfycbzIS22cQctSbxjBQs-an8aaUYAV03UZcNpUv6hqrl0mTaLX7HG4tcpD6RerSZ8KEwYk/exec";

let data=[];
let tab="return";

/* LOAD */
function loadData(){
fetch(URL+"?mode=admin")
.then(r=>r.json())
.then(d=>{
data=d;
stats();
render();
});
}

/* STATS FIX */
function stats(){

let today=new Date().toISOString().split("T")[0];
let yesterday=new Date(Date.now()-86400000).toISOString().split("T")[0];

let t=0,y=0,total=0,r=0,e=0,d=0,done=0;

data.forEach(row=>{
let dt=row.date;
let type=row.type;
let st=row.status;

if(type==="return"||type==="exchange"){
total++;
if(dt===today) t++;
if(dt===yesterday) y++;
}

if(type==="return"&&st==="pending") r++;
if(type==="exchange"&&st==="pending") e++;
if(st==="duplicate") d++;
if(st==="done") done++;
});

document.getElementById("today").innerText=t;
document.getElementById("yesterday").innerText=y;
document.getElementById("total").innerText=total;

document.getElementById("returnTab").innerText=`Return (${r})`;
document.getElementById("exchangeTab").innerText=`Exchange (${e})`;
document.getElementById("duplicateTab").innerText=`Duplicate (${d})`;
document.getElementById("doneTab").innerText=`Done (${done})`;
}

/* TAB */
function setTab(t){
tab=t;
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
document.getElementById(t+"Tab").classList.add("active");
render();
}

/* ACTION */
function apply(i){

let row=data[i];
let action=document.getElementById("a_"+i).value;

if(!action) return alert("Select action");

fetch(URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
mode:"updateStatus",
request_id:row.request_id,
status:action.toUpperCase()
})
})
.then(()=>loadData());
}

/* RENDER */
function render(){

let search=document.getElementById("searchBox").value.toLowerCase();

let html="<tr><th>ID</th><th>Name</th><th>Mobile</th><th>Status</th><th>Action</th></tr>";
let mobile="";

data.forEach((row,i)=>{

let txt=JSON.stringify(row).toLowerCase();
if(search && !txt.includes(search)) return;

let show=false;

if(tab==="return" && row.type==="return" && row.status==="pending") show=true;
if(tab==="exchange" && row.type==="exchange" && row.status==="pending") show=true;
if(tab==="duplicate" && row.status==="duplicate") show=true;
if(tab==="done" && row.status==="done") show=true;

if(!show) return;

let actionHTML=`
<select id="a_${i}">
<option value="">Select</option>
<option value="pickup">Pickup</option>
<option value="duplicate">Duplicate</option>
<option value="done">Done</option>
</select>
<button onclick="apply(${i})">✔</button>
`;

html+=`<tr>
<td>${row.request_id}</td>
<td>${row.name}</td>
<td>${row.mobile}</td>
<td>${row.status}</td>
<td>${actionHTML}</td>
</tr>`;

mobile+=`
<div class="mobile-card">
<b>${row.name}</b>
<div class="mobile-row">${row.mobile}</div>
<div class="mobile-row">Order: ${row.order_id}</div>
<div class="mobile-row">${row.type} | ${row.status}</div>
<div class="mobile-row">${actionHTML}</div>
</div>
`;

});

document.getElementById("table").innerHTML=html;
document.getElementById("mobileView").innerHTML=mobile;
}

loadData();

</script>

</body>
</html>
