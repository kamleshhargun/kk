<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body { font-family: Arial; background:#f6f6f7; padding:10px; }
h2 { text-align:center; }

/* Tabs */
.tabs { text-align:center; margin-bottom:10px; }

.tabs button {
  padding:8px 12px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#e5e7eb;
}

.tabs button.active {
  background:#111;
  color:#fff;
}

/* Table */
table {
  width:100%;
  background:#fff;
  border-collapse: collapse;
}

th, td {
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:12px;
}

th { background:#f1f2f4; }

/* Buttons */
.btn {
  padding:5px 8px;
  margin:2px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:11px;
}

.pickup { background:#e3f1df; }
.received { background:#dbeafe; }
.ship { background:#ede9fe; }
.done { background:#f3f4f6; }
.undo { background:#fdecea; color:#c62828; }
.delete { background:#000; color:#fff; }

</style>
</head>

<body>

<h2>Gulabi Shehar R&E Management System </h2>

<div class="tabs" id="tabs">
  <button data-tab="pending" class="active">Active</button>
  <button data-tab="pickup_generated">Pickup</button>
  <button data-tab="received">Received</button>
  <button data-tab="exchange_shipped">Shipped</button>
  <button data-tab="completed">Completed</button>
  <button data-tab="deleted">Deleted</button>
</div>

<table id="table"></table>

<script>
const API = "https://script.google.com/macros/s/AKfycbwcCPMTmU2FC0QDC-erKTzoz2GEmQAlXm4hYgnHSPyGW3BVHR1RU3Nxf5wurv3-ideMAA/exec";
let currentTab = "pending";

// TAB CLICK
document.querySelectorAll("#tabs button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    setTab(btn.dataset.tab);
  });
});

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelector(`[data-tab="${tab}"]`).classList.add("active");

  loadData();
}

// ✅ DATE FORMAT FIX
function formatDate(dateStr){
  if(!dateStr) return "";
  let d = new Date(dateStr);
  return d.toLocaleDateString("en-IN", {
    timeZone: "Asia/Kolkata",
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

// ✅ TIME FORMAT FIX (1899 ISSUE SOLVED)
function formatTime(timeStr){
  if(!timeStr) return "";
  let d = new Date(timeStr);
  return d.toLocaleTimeString("en-IN", {
    timeZone: "Asia/Kolkata",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// LOAD DATA
async function loadData(){
  let res = await fetch(API);
  let data = await res.json();

  let html = `
<tr>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Order</th>
<th>Type</th>
<th>Reason</th>
<th>Status</th>
<th>Duplicate</th>
<th>Action</th>
</tr>`;

  data.forEach(item=>{

    if(currentTab === "completed"){
      if(item.status !== "completed" && item.status !== "refunded") return;
    } else {
      if(item.status !== currentTab) return;
    }

    html += `
<tr>
<td>${formatDate(item.date)}</td>
<td>${formatTime(item.time)}</td>
<td>${item.request_id}</td>
<td>${item.name}</td>
<td>${item.mobile}</td>
<td>${item.email}</td>
<td>${item.order_id}</td>
<td>${item.type}</td>
<td>${item.reason}</td>
<td>${item.status}</td>
<td>${item.duplicate}</td>
<td>
  ${nextButton(item)}
  ${undoButton(item)}
  ${deleteButton(item)}
</td>
</tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

// NEXT ACTION
function nextButton(item){

  if(item.status === "pending"){
    return `<button class="btn pickup" onclick="action('${item.request_id}','pickup_generated')">Pickup</button>`;
  }

  if(item.status === "pickup_generated"){
    return `<button class="btn received" onclick="action('${item.request_id}','received')">Received</button>`;
  }

  if(item.status === "received"){
    if(item.type === "exchange"){
      return `<button class="btn ship" onclick="action('${item.request_id}','exchange_shipped')">Shipped</button>`;
    }
    if(item.type === "return"){
      return `<button class="btn done" onclick="action('${item.request_id}','refunded')">Refund</button>`;
    }
  }

  if(item.status === "exchange_shipped"){
    return `<button class="btn done" onclick="action('${item.request_id}','completed')">Complete</button>`;
  }

  return "";
}

// DELETE BUTTON
function deleteButton(item){
  if(item.status === "pending"){
    return `<button class="btn delete" onclick="action('${item.request_id}','deleted')">Delete</button>`;
  }
  return "";
}

// UNDO
function undoButton(item){

  let prev = "";

  if(item.status === "pickup_generated") prev = "pending";
  else if(item.status === "received") prev = "pickup_generated";
  else if(item.status === "exchange_shipped") prev = "received";
  else if(item.status === "completed") prev = "exchange_shipped";
  else if(item.status === "refunded") prev = "received";
  else if(item.status === "deleted") prev = "pending";

  if(prev === "") return "";

  return `<button class="btn undo" onclick="action('${item.request_id}','${prev}')">Undo</button>`;
}

// ACTION
function action(id, status){

  let msg = (status === "deleted") 
    ? "Delete this request?" 
    : "Proceed to next step?";

  if(!confirm(msg)) return;

  updateStatus(id, status);

  setTab(status); // 🔥 tab auto switch fix
}

// API
async function updateStatus(id, status){
  await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"update",
      request_id:id,
      status:status
    })
  });
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
