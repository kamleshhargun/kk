<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}
.container {
  max-width: 1100px;
  margin: 20px auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
h2 { text-align:center; }

.tabs {
  text-align:center;
  margin-bottom:15px;
}
.tabs button {
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#e0e0e0;
}
.tabs button.active {
  background:#000;
  color:white;
}

table {
  width:100%;
  border-collapse: collapse;
  font-size: 13px;
}
th, td {
  border:1px solid #ddd;
  padding:7px;
  text-align:center;
}

button.action {
  padding:5px 8px;
  margin:2px;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h2>Admin Panel</h2>

<div class="tabs">
  <button onclick="setTab('return')" id="returnTab" class="active">Return</button>
  <button onclick="setTab('exchange')" id="exchangeTab">Exchange</button>
  <button onclick="setTab('done')" id="doneTab">Done</button>

  <button onclick="loadData()">🔄</button>
</div>

<table id="dataTable"></table>

</div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbxCrg2WbNHdMWFoEPsSAm6_VONtmuNMHArFivgjdrIPHnsfgNkVU5kepDFrnjdIgGgJ/exec?mode=admin";

let globalData = [];
let currentTab = "return";

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById(tab+"Tab").classList.add("active");

  renderTable();
}

function loadData(){
  fetch(sheetURL)
  .then(res => res.json())
  .then(data=>{
    globalData = data;
    renderTable();
  })
  .catch(()=>{
    alert("❌ Data load error");
  });
}

function renderTable(){

  if(globalData.length === 0){
    document.getElementById("dataTable").innerHTML = "<tr><td>No Data</td></tr>";
    return;
  }

  let html = `
  <tr>
    <th>Date</th>
    <th>Time</th>
    <th>Request No</th>
    <th>Name</th>
    <th>Mobile</th>
    <th>Email</th>
    <th>Order ID</th>
    <th>Type</th>
    <th>Status</th>
    <th>Action</th>
  </tr>`;

  globalData.forEach((row,index)=>{

    let type = (row.type || "").toLowerCase().trim();
    let status = (row.status || "").toLowerCase().trim();

    let show = false;

    // ✅ STRICT FILTER (NO MIX)
    if(currentTab === "return" && type === "return" && status !== "done") show = true;
    if(currentTab === "exchange" && type === "exchange" && status !== "done") show = true;
    if(currentTab === "done" && status === "done") show = true;

    if(show){
      html += `<tr>
        <td>${row.date || ""}</td>
        <td>${row.time || ""}</td>
        <td>${row.request_id || ""}</td>
        <td>${row.name || ""}</td>
        <td>${row.mobile || ""}</td>
        <td>${row.email || ""}</td>
        <td>${row.order_id || ""}</td>
        <td>${row.type || ""}</td>
        <td>${row.status || ""}</td>
        <td>
          <button class="action" onclick="sendWhatsApp(${index})">Msg</button>
        </td>
      </tr>`;
    }

  });

  document.getElementById("dataTable").innerHTML = html;
}

function sendWhatsApp(i){
  let r = globalData[i];

  let msg = `Hello ${r.name}
Request ID: ${r.request_id}
Status: ${r.status}`;

  window.open(`https://wa.me/91${r.mobile}?text=${encodeURIComponent(msg)}`);
}

loadData();

</script>

</body>
</html>
